weight_training:
  name: "Cyclist Strength Routine"
  duration_minutes: 60
  description: |
    Warm-Up (8 min)
    Deadbugs (1x15), scissor kicks (1x15), hip circles, band pull-aparts,
    bodyweight squats — core switched on, hip flexors primed for the climbing
    upstroke, hips/shoulders mobile. Then 2 light ramp-up sets on your first
    heavy lift before working weight.

    Block 1: Heavy Strength (30 min) — the part that actually moves your power.
    Lift heavy, low reps, and rest 2-3 min between sets. These are loadable on
    purpose so you can progress over time.
    1. Back Squat (or Belt Squat) — 4x5-6 @ heavy
       The single highest-yield lift for cycling power. A belt squat or
       safety-bar variant works equally well if spinal loading is a concern.
       Drive through mid-foot, full depth, brace the core. This bilateral
       squat is the anchor of the day — log the load every session so
       progression is visible.
    2. Trap-Bar Deadlift (or Romanian Deadlift) — 3x5-6 @ heavy
       Your loaded hip hinge. Pull every rep to a hard glute squeeze at
       lockout. Hinge from the hips, neutral spine. Log the TOTAL weight
       (bar + plates, not plates only) — this lift should end up the heaviest
       of the day, comfortably above the squat.
    3. Bulgarian Split Squat (Dumbbells) — 3x6-8 each leg @ heavy
       Single-leg strength and hip stability. Hold DBs and load it — work toward
       30-40lb. Control the descent, drive through the front heel.
    4. Single-Leg Calf Raise — 2x12-15 each leg
       Ankle stability and pedaling efficiency. Single-leg, full range, add a DB
       once bodyweight is easy.

    Block 2: Upper Body Balance (12 min) — accessory, keep it brisk.
    5. Bent Over Row (Band or DB) — 3x10-12
       Upper back strength, counters cycling posture. Use DBs if you have them so
       you can progress.
    6. Push Up (Band or regular) — 3x12-15
       Chest and triceps. Add band or elevate feet for progressive resistance.
    7. Face Pull (Band or Cable) — 3x15
       Rear delts and external rotators — keeps shoulders healthy and pulls you
       out of that hunched riding position.

    Block 3: Core Stability (8 min)
    8. Ab Wheel — 3x8-10
       Anti-extension. If too difficult, do them from knees with limited range.
    9. Side Plank — 3x30-45 sec each side
       Anti-lateral flexion. Keeps your hips from dropping while pedaling.
       Log the actual seconds (prefill the duration in the Hevy routine so
       checked-off sets don't record as 0s).
    10. Pallof Press (Band) — 2x10 each side
        Anti-rotation. Anchor the band at chest height, press out and hold.

    Cooldown (5 min)
    Hip flexor stretch, pigeon pose, chest doorway stretch — address the areas
    that get tight from riding.

    Progression rule: when you complete every set at the TOP of the rep range
    with good form, add load (or reps on bodyweight moves) next session. If a lift
    sits at the same weight x reps for 3+ sessions, it has stalled — bump it.

weight_training_taper:
  name: "Strength Taper"
  duration_minutes: 30
  description: |
    Race-approach maintenance — keep the heavy stimulus, cut the fatigue.
    Frequency drops to 1x/week; this is NOT a deload of load, only of volume.

    Warm-Up (6 min)
    Deadbugs (2x10), band pull-aparts, bodyweight squats, then 2 light ramp-up
    sets on the squat.

    Heavy Compounds (20 min) — same load as your block, far less volume.
    1. Back Squat (or Belt Squat) — 2x4-5 @ heavy
       Same load you built to in the block. Crisp, fast reps; stop well short
       of failure.
    2. Trap-Bar Deadlift (or Romanian Deadlift) — 2x4-5 @ heavy
       Same load you built to in the block. Heavy hinge, low volume. Leave
       the gym feeling fresh, not cooked.

    Cooldown (4 min)
    Hip flexor stretch, pigeon pose. Skip accessories — the goal is to retain
    strength while staying race-fresh.

    Note: drop strength entirely in the final race week.

sweet_spot:
  name: "Sweet Spot Intervals"
  duration_minutes: 60
  # NOTE: the calendar event never carries this prose — sweet-spot sessions are
  # always pushed as structured `% FTP` steps (src/workout.ts), which is what
  # shows targets in Intervals.icu. This text is the coaching rationale kept
  # with the config; its placeholders render wherever it does surface.
  description: |
    Warm-up (15 min)
    Easy Zone 2 spin at natural cadence (85-95 rpm), with 2-3 short 30s openers
    near threshold in the last 5 min to prime the legs.

    Main Set: 3 x 12 min @ 88-94% FTP (~{w:88-94}W at {ftp}W FTP)
    Seated, sustained sweet-spot effort at your self-selected cadence (most
    riders settle around 85-95 rpm — let it come naturally, don't force it low).
    This is the highest-yield cycling session for raising lactate threshold and
    FTP. Hold steady, even power; the work is in the back half of each rep.
    5 min easy Zone 1-2 spin between intervals to partially recover.

    Cooldown (8 min)
    Easy Zone 1 spin at a comfortable cadence.

    Progression
    When 3 x 12 min feels sustainable, extend to 3 x 15 min, then 2 x 20 min,
    then nudge the target toward 95% FTP. Wattage targets track your
    Intervals.icu eFTP automatically (see ftp_sync below) — a formal re-test
    every couple of months keeps the estimate honest.

    Why this replaced low-cadence grinding
    A 12-week RCT in veteran cyclists (mean age 47) found moderate-intensity
    40rpm intervals produced no gain in aerobic capacity, performance, power, or
    leg strength (Paton et al., Front. Physiol. 2014). Sweet-spot/threshold work
    directly raised threshold W/kg in recreational men of the same age cohort
    (MDPI Sports 2024). Heavy barbell work — not big-gear grinding — is the
    evidence-backed route to force adaptations; that's the weight_training day.

periodization:
  taper_weeks: 4 # fewer weeks-to-race than this → taper routine, 1x/week
  taper_zero_weeks: 1 # final week before the race → no strength
  race_date: null # fallback only; the RACE_A calendar event is used when present

scheduling:
  tsb_fresh: 5
  tsb_fatigued: -10
  tsb_very_fatigued: -20
  weight_sessions: 2
  weight_sessions_very_fatigued: 1
  weight_sessions_taper: 1
  min_weight_gap_days: 2
  max_weekly_ramp_pct: 7
  # 80/20 enforcement: hard interval rides per week, on top of the one
  # sweet-spot session. With 1, a fresh week has at most 2 hard cycling days
  # (sweet-spot + 1); every other day fills as easy Zone 2 base. Raise toward 2
  # only in a dedicated build block — keeping this low is what holds the
  # ~80% low-intensity majority the evidence calls for. All non-quality days
  # are easy, never "moderate" — moderate-everywhere riding is the grey-zone
  # trap to avoid.
  hard_cycling_days: 1

# Planned-load targets the planner attaches to each generated workout, so the
# calendar shows TSS/duration/IF and Intervals.icu folds them into planned CTL.
# TSS = (minutes / 60) * IF^2 * 100. The latest easy ride each week is promoted
# to a single long endurance ride (long_minutes) — the century durability anchor.
# Tune these to your FTP and the volume your week can absorb.
load_targets:
  easy_if: 0.62 # easy Zone 2 intensity factor (watts render from live FTP at push time)
  easy_minutes: 75 # standard easy ride duration → ~48 TSS
  long_minutes: 180 # weekly long endurance ride → ~127 TSS (build this up over a block)
  hard_if: 0.88 # hard interval ride IF → ~90 TSS at 75 min
  hard_minutes: 75
  sweet_spot_if: 0.88 # applied to the sweet_spot session (60 min) → ~77 TSS

# eFTP sync: `plan` and `push-week` read Intervals.icu's rolling eFTP estimate
# (the icu_rolling_ftp stamped on the latest ride) and write it to the Ride
# sport-settings FTP, so the `% FTP` structured steps and every rendered watt
# callout track current fitness — no hand-edited FTP after each test. Prose
# descriptions use placeholders rendered at push time: {ftp}, {lthr},
# {w:NN[-MM]} (watts at % FTP), {hr:NN[-MM]} (bpm at % LTHR). max_change_pct
# refuses a single implausible jump (corrupt file, power-meter spike) — apply
# such a change by setting FTP in Intervals.icu manually if it's real.
ftp_sync:
  enabled: true
  max_change_pct: 10

# Holiday awareness: days covered by an Intervals.icu HOLIDAY calendar event
# are blocked out of the week instead of scheduled — no rides pushed while
# traveling. mode "skip" leaves those days empty (the holiday banner already
# explains the gap); "placeholder" pushes a zero-load "optional cross-training"
# entry on each covered day instead. lookback_days matters because the events
# API only returns events *starting* in the queried range — a trip that began
# weeks ago would otherwise be invisible to the weekly planning fetch, so
# holidays are fetched this far back. Set enabled: false to treat HOLIDAY
# events like any other calendar event (they then lock only their start day).
holidays:
  enabled: true
  mode: skip
  lookback_days: 60

# Readiness guard: HRV / resting-HR trend from Intervals.icu wellness. A short
# recent window is compared to a longer rolling baseline; a clear drop downgrades
# the week one fatigue tier (floored at "fatigued"), the same easy-bias logic as
# the ramp guard. It only ever makes the week easier, never harder. Defaults are
# the conservative preset — react only to a sustained drop. Set enabled: false to
# plan on TSB alone.
readiness:
  enabled: true
  recent_days: 4 # trailing window averaged as "today's" readiness
  baseline_days: 28 # window before the recent one used as the personal baseline
  min_baseline_samples: 14 # need this many baseline readings or readiness abstains
  hrv_drop_sd: 1.5 # recent HRV ≤ baseline_mean − 1.5·SD → suppressed
  rhr_rise_bpm: 7 # recent resting HR ≥ baseline_median + 7 bpm → suppressed
  rhr_artifact_bpm: 25 # resting HR ≥ baseline_median + 25 bpm is a sensor artifact (e.g. a ride file's bogus "resting HR" overwriting wellness), dropped before the median so it can't fake a false alarm
