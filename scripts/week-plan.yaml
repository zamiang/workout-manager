# Editable weekly plan for scripts/push-week.ts.
#
# Each session has a `day` (Mon..Sun, or a 0-6 offset from the anchor Monday)
# and either:
#   - `workout: sweet_spot` / `workout: weight_training`
#       -> pulls name + description straight from config.yaml, or
#   - an explicit `name`, `type` (Ride | WeightTraining | ...), `description`.
#
# By default the week is anchored to the upcoming Monday. Override with
#   npm run push-week -- --start 2026-06-08
# Preview without writing to Intervals.icu with --dry-run. Days that already
# have a calendar event are skipped so re-running never duplicates.

# Week of 2026-06-15 — controlled rebuild after the absorption week.
# Mon (Easy) and Tue (3h Long Endurance) are already on the calendar and are
# skipped by push-week. This file fills Wed-Sun: one stacked quality day
# (sweet-spot + strength, per the polarized-stacking rule), a full rest day
# after it, a second aerobic touch Saturday, and the second strength session
# Sunday (3-day gap from Thursday). Friday is deliberately left empty = rest.
# Planned week ≈ 374 TSS — just under CTL-maintenance (~418) coming off the
# sub-600 absorption week, well inside the 7% ramp guard.

sessions:
  - day: Wed
    name: Easy Z2 Ride
    type: Ride
    load: 48
    minutes: 75
    intensity: 0.62
    description: >
      Easy Zone 2 endurance ride, ~75 min. Conversational power/HR
      (~160W at 260 FTP). Spin the legs out after Tuesday's long ride;
      tomorrow is the week's quality day.

  - day: Thu
    # Replaced the planned sweet-spot session with an indoor FTP test (pushed
    # 2026-06-11 via --replace): Xert estimates threshold ~237 W vs the 260 W
    # the config assumes, so recalibrate before doing more sweet-spot work.
    name: FTP Test (Indoor)
    type: Ride
    load: 76
    minutes: 60
    intensity: 0.87
    description: >
      Indoor FTP test on the trainer — 20-min protocol or ramp test (pick one
      and reuse it). Update FTP in Intervals.icu and config.yaml afterwards.

  - day: Thu
    workout: weight_training
    # Stacked quality day: intervals first on fresh legs, lift after.
    # Concentrating the stress here keeps Friday a true recovery day.

  # Fri intentionally empty — full rest day after the stacked quality day.

  - day: Sat
    name: Endurance Z2 Ride
    type: Ride
    load: 74
    minutes: 105
    intensity: 0.65
    description: >
      Steady Zone 2 endurance ride, ~105 min. Strictly aerobic, no surges.
      Practice century fueling: ~60-90 g carb/hr from the first 30 min.

  - day: Sun
    workout: weight_training
