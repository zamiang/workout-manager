# Editable weekly plan for scripts/push-week.ts.
#
# Each session has a `day` (Mon..Sun, or a 0-6 offset from the anchor Monday)
# and either:
#   - `workout: sweet_spot` / `workout: weight_training`
#       -> pulls name + description straight from config.yaml, or
#   - an explicit `name`, `type` (Ride | WeightTraining | ...), `description`.
#
# By default the week is anchored to the upcoming Monday. Override with
#   npm run push-week -- --start 2026-07-06
# Preview without writing to Intervals.icu with --dry-run. Days that already
# have a calendar event are skipped so re-running never duplicates.

# Week of 2026-07-06 — RE-ENTRY after a fully-off vacation week.
# Rationale: back from a layoff with TSB +27 and Xert flagging "Detraining"
# (CTL down to ~52). That freshness is de-training, not taper freshness, so we
# deliberately DROP the VO2 Max ride the generator wanted to stack on day 0 —
# connective tissue is least ready right after time off, even when the legs feel
# great. The week is one moderate quality dose (Wed sweet-spot) surrounded by
# easy Z2 base, rebuilding volume before intensity resumes next week. This is
# hand-tuned rather than `npm run plan` because the generator reads the fresh
# TSB as license for hard rides.
# Watts/HR use FTP 235 / LTHR 160.

sessions:
  # Day 0 — ease back in: easy Z2 ride + strength, stacked. LIFT FIRST while
  # fully fresh (protects form/tendons after the layoff), then the easy spin
  # doubles as an active-recovery flush that isn't compromised by the lifting.
  # First session back on the bar: ramp the loads back, don't chase a 4x5 PR.
  - day: Mon
    name: Easy Z2 Ride
    type: Ride
    load: 48
    minutes: 75
    intensity: 0.62
    description: >
      Easy Zone 2, ~75 min, conversational (~146W at 235 FTP, HR under ~133 /
      83% LTHR 160). First ride back — keep it strictly aerobic, no surges, no
      hills hammered. Do this AFTER the strength session as a flush spin.

  - day: Mon
    workout: weight_training

  # Tue intentionally empty — rest day. Sleep, walk, fuel; let the first day
  # back settle before the mid-week quality dose.

  # Mid-week quality — the single hard session of the re-entry week. Structured
  # sweet-spot pulled from config (3 x 12 min). Don't extend the reps this week;
  # just re-touch the intensity on legs that haven't seen it in a week+.
  - day: Wed
    workout: sweet_spot
    intensity: 0.88

  - day: Wed
    workout: weight_training

  # Thu/Fri/Sat — easy Z2 base. Rebuilding the aerobic volume the layoff cost,
  # concentrating all stress into Wed's dose and keeping ~80/20 low-intensity.
  - day: Thu
    name: Easy Z2 Ride
    type: Ride
    load: 48
    minutes: 75
    intensity: 0.62
    description: >
      Easy Zone 2, ~75 min, conversational (~146W at 235 FTP, HR under ~133).
      Pure aerobic base — keep it boring and steady.

  - day: Fri
    name: Easy Z2 Ride
    type: Ride
    load: 48
    minutes: 75
    intensity: 0.62
    description: >
      Easy Zone 2, ~75 min, conversational (~146W at 235 FTP, HR under ~133).
      Pure aerobic base — keep it boring and steady.

  - day: Sat
    name: Easy Z2 Ride
    type: Ride
    load: 48
    minutes: 75
    intensity: 0.62
    description: >
      Easy Zone 2, ~75 min, conversational (~146W at 235 FTP, HR under ~133).
      Pure aerobic base — keep it boring and steady.

  # Durability anchor — long aerobic to close the week and start rebuilding the
  # century base. Strictly Z2; if the legs feel flat from the layoff, cut it
  # short rather than pushing intensity to compensate.
  - day: Sun
    name: Long Endurance Ride
    type: Ride
    load: 115
    minutes: 180
    intensity: 0.62
    description: >
      Long Z2 endurance, ~3h. Strictly aerobic (~146W at 235 FTP, HR under
      ~133). Practice century fueling: 60-90 g carb/hr from the first 30 min.
      Durability over intensity — keep it steady to the end. First long ride
      back, so it's fine to trim to ~2h30 if you're fading.
