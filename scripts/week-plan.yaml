# Editable weekly plan for scripts/push-week.ts.
#
# Each session has a `day` (Mon..Sun, or a 0-6 offset from the anchor Monday)
# and either:
#   - `workout: low_cadence` / `workout: weight_training`
#       -> pulls name + description straight from config.yaml, or
#   - an explicit `name`, `type` (Ride | WeightTraining | ...), `description`.
#
# By default the week is anchored to the upcoming Monday. Override with
#   npm run push-week -- --start 2026-06-08
# Preview without writing to Intervals.icu with --dry-run. Days that already
# have a calendar event are skipped so re-running never duplicates.

# Absorption week. Tuesday's low-cadence session ran long outdoors (149 TSS vs.
# the ~70 planned), landing on three straight 580-710 TSS weeks and a +12 CTL
# ramp since mid-May. The rest of the week is trimmed to let this land near
# ~350 TSS total — the first sub-600 week since the May 11 recovery week.
# `load` is planned TSS pushed to Intervals.icu; `minutes` and `intensity`
# (IF) are pushed as the planned duration and intensity factor.

sessions:
  - day: Tue
    workout: low_cadence
    # Already completed as a 149-TSS outdoor ride; this entry is skipped if the
    # day already has an event. For future weeks, keep it indoor: ~60 min,
    # short easy recovery spins between the low-cadence blocks.
    load: 70
    minutes: 60
    intensity: 0.85

  - day: Wed
    name: Easy Z2 Ride
    type: Ride
    load: 40
    minutes: 50
    intensity: 0.62
    description: >
      Easy Zone 2 endurance ride, ~50 min. Conversational power/HR. Pure
      recovery spin — flush the legs after Tuesday's big day.

  - day: Thu
    workout: weight_training

  - day: Fri
    name: Easy Z2 Ride (optional)
    type: Ride
    load: 30
    minutes: 40
    intensity: 0.62
    description: >
      Easy Zone 2, ~40 min, or rest. HRV gate: if morning HRV is still
      depressed (<~50) or resting HR elevated, take this as a rest day.

  - day: Sat
    name: Endurance Z2 Ride
    type: Ride
    load: 75
    minutes: 105
    intensity: 0.65
    description: >
      Longer easy Zone 2 ride, ~90-105 min. The week's one real aerobic
      touch — strictly aerobic, no surges. Fuel ~60 g carb/hr. HRV gate:
      trim to ~60 min if recovery is still lagging.

  - day: Sun
    workout: weight_training
